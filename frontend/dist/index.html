<!DOCTYPE html>
<html lang="en">
<head>

  <title>Crawtopia</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Critical inline styles for fast paint */
    body { background: #0a0a0f; color: #e4e4ef; }

</head>
<body>
  <div class="app">
    <nav class="sidebar">

        <div class="sidebar-phase" id="city-phase">loading...</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#x1F3D9;</span>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="constitution">

          <span class="nav-icon">&#x1F3DB;</span>

  <script src="/app.js"></script>

</html>
